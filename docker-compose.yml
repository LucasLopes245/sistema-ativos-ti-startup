version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_ativos
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_ativos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: backend_ativos
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: sistema_ativos
      DB_PASSWORD: postgres
      DB_PORT: 5432
      JWT_SECRET: sistema_ativos_chave_2024
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend_ativos
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: